<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECHO | 光貨で楽しむ対話の場</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif; }

    #bg { position:fixed; inset:0; z-index:0; }

    .screen { position:fixed; inset:0; z-index:1; display:none; flex-direction:column; overflow-y:auto; overflow-x:hidden; }
    .screen.active { display:flex; }

    /* ====== SELECT ====== */
    #screen-select { background:transparent; }

    .select-top {
      text-align:center;
      padding: 60px 20px 20px;
      flex-shrink:0;
    }
    .theykhc-label { font-size:11px; letter-spacing:10px; color:#ffffff44; margin-bottom:12px; }
    .echo-title {
      font-size:min(22vw, 120px);
      font-weight:900;
      letter-spacing:0.05em;
      line-height:1;
      background:linear-gradient(135deg,#ffffff 0%,#c4b5fd 40%,#60a5fa 70%,#f0abfc 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 40px #B39DDB88);
    }
    .echo-sub { font-size:13px; letter-spacing:4px; color:#64748b; margin-top:10px; }

    .balance-wrap { display:flex; justify-content:center; margin:20px 0 8px; }
    .balance-pill {
      display:inline-flex; align-items:center; gap:12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:999px; padding:12px 28px;
      backdrop-filter:blur(20px);
      box-shadow:0 0 30px rgba(179,157,219,0.2);
    }
    .bal-star { font-size:20px; color:#facc15; animation:rotate 5s linear infinite; }
    @keyframes rotate{to{transform:rotate(360deg)}}
    .bal-num { font-size:26px; font-weight:900; }
    .bal-lbl { font-size:13px; color:#94a3b8; }
    .bal-hint { text-align:center; font-size:11px; color:#334155; letter-spacing:1px; margin-bottom:20px; }

    .choose-label {
      text-align:center; font-size:11px; letter-spacing:6px; color:#475569;
      text-transform:uppercase; margin:10px 0 20px;
    }

    /* カード — 横幅フル */
    .artist-cards {
      display:flex; flex-direction:column; gap:12px;
      padding:0 12px 80px; width:100%; max-width:640px; margin:0 auto;
    }
    .artist-card {
      position:relative; border-radius:24px; padding:28px 28px 24px;
      cursor:pointer; color:#fff; border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.03); backdrop-filter:blur(20px);
      overflow:hidden; transition:transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      text-align:left; width:100%;
    }
    .artist-card:hover { transform:scale(1.02); }
    .artist-card.key:hover   { border-color:#4A90D9aa; box-shadow:0 0 60px #4A90D944; }
    .artist-card.sol:hover   { border-color:#F5A623aa; box-shadow:0 0 60px #F5A62344; }
    .artist-card.luna:hover  { border-color:#B39DDBaa; box-shadow:0 0 60px #B39DDB44; }

    .card-bg-glow {
      position:absolute; inset:0; border-radius:24px; opacity:0;
      transition:opacity 0.3s;
    }
    .artist-card:hover .card-bg-glow { opacity:1; }
    .key  .card-bg-glow { background:radial-gradient(ellipse at 20% 50%,#4A90D922 0%,transparent 70%); }
    .sol  .card-bg-glow { background:radial-gradient(ellipse at 20% 50%,#F5A62322 0%,transparent 70%); }
    .luna .card-bg-glow { background:radial-gradient(ellipse at 20% 50%,#B39DDB22 0%,transparent 70%); }

    /* ペンライト帯 — カード上部フル */
    .card-penlights {
      position:absolute; top:0; left:0; right:0; height:5px;
      display:flex; gap:0;
    }
    .pl-seg {
      flex:1; height:100%;
      animation:plpulse 1.4s ease-in-out infinite;
    }
    @keyframes plpulse{0%,100%{opacity:0.3}50%{opacity:1}}

    .card-inner { position:relative; display:flex; align-items:center; gap:20px; }
    .card-emoji { font-size:48px; flex-shrink:0; filter:drop-shadow(0 0 16px var(--c)); }
    .card-text { flex:1; }
    .card-name { font-size:18px; font-weight:900; letter-spacing:2px; margin-bottom:4px; }
    .card-tagline { font-size:12px; margin-bottom:10px; }
    .card-desc { font-size:13px; color:#94a3b8; line-height:1.8; }
    .card-arrow { font-size:24px; color:#ffffff33; flex-shrink:0; transition:color 0.2s, transform 0.2s; }
    .artist-card:hover .card-arrow { color:#ffffffaa; transform:translateX(4px); }

    /* ====== CHAT ====== */
    #screen-chat { background:transparent; }
    .chat-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:44px 20px 14px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background:rgba(0,0,0,0.6); backdrop-filter:blur(24px);
      flex-shrink:0; position:sticky; top:0; z-index:10;
    }
    .back-btn { background:none; border:none; color:#64748b; font-size:14px; cursor:pointer; padding:8px 12px; border-radius:999px; transition:background 0.2s; }
    .back-btn:hover { background:rgba(255,255,255,0.06); }
    .chat-info { text-align:center; }
    .chat-name { font-weight:900; font-size:16px; letter-spacing:2px; }
    .chat-tag  { font-size:11px; margin-top:2px; }
    .chat-bal  { text-align:right; }
    .chat-bal-n { font-weight:900; font-size:16px; color:#facc15; }
    .chat-bal-l { font-size:10px; color:#475569; }

    .messages {
      flex:1; overflow-y:auto; padding:20px 16px 12px;
      display:flex; flex-direction:column; gap:14px;
    }
    .msg { display:flex; }
    .msg.user   { justify-content:flex-end; }
    .msg.artist { justify-content:flex-start; }
    .bubble {
      max-width:80%; border-radius:22px; padding:14px 20px;
      font-size:14px; line-height:1.9; white-space:pre-line;
    }
    .bubble.user {
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:22px 22px 4px 22px;
    }
    .bubble.artist {
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:22px 22px 22px 4px;
      backdrop-filter:blur(20px);
    }
    .typing-row { display:flex; justify-content:flex-start; }
    .typing-bub {
      background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.07);
      border-radius:22px 22px 22px 4px; padding:16px 22px;
      display:flex; gap:7px; align-items:center;
    }
    .dot { width:8px; height:8px; border-radius:50%; background:#94a3b8; animation:bop 1.2s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bop{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1.3);opacity:1}}

    .lyric-btn-wrap { padding:8px 16px; flex-shrink:0; }
    .lyric-btn {
      width:100%; padding:15px; border-radius:18px;
      font-size:14px; font-weight:900; border:none; cursor:pointer;
      letter-spacing:2px; position:relative; overflow:hidden;
      transition:opacity 0.2s, transform 0.15s;
    }
    .lyric-btn:hover { transform:scale(1.01); }
    .lyric-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 50%,transparent 100%);
      transform:translateX(-100%); animation:shim 2s infinite;
    }
    @keyframes shim{100%{transform:translateX(100%)}}

    .input-wrap { padding:10px 16px 40px; display:flex; gap:10px; flex-shrink:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(20px); }
    .chat-input {
      flex:1; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.15); border-radius:999px;
      padding:15px 22px; font-size:14px; color:#fff; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input:focus { border-color:rgba(255,255,255,0.35); box-shadow:0 0 20px rgba(255,255,255,0.05); }
    .chat-input::placeholder { color:#334155; }
    .send-btn {
      width:54px; height:54px; border-radius:50%; font-weight:900; font-size:24px;
      border:none; cursor:pointer; flex-shrink:0; transition:transform 0.15s;
    }
    .send-btn:hover { transform:scale(1.1); }
    .chat-hint { text-align:center; font-size:11px; color:#1e293b; padding-bottom:8px; flex-shrink:0; }

    /* ====== GENERATING ====== */
    #screen-generating { align-items:center; justify-content:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(30px); }
    .gen-emoji { font-size:80px; margin-bottom:28px; animation:genpulse 1.5s ease-in-out infinite; }
    @keyframes genpulse{0%,100%{transform:scale(1) rotate(-3deg);opacity:0.8}50%{transform:scale(1.15) rotate(3deg);opacity:1}}
    .gen-text { font-size:14px; color:#64748b; letter-spacing:3px; margin-bottom:36px; }
    .gen-bar { width:260px; height:3px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
    .gen-fill { height:100%; border-radius:999px; animation:genload 1.8s ease-in-out infinite; }
    @keyframes genload{0%{width:0%;opacity:1}100%{width:100%;opacity:0.2}}

    /* ====== RESULT ====== */
    #screen-result { background:transparent; }
    .result-header { text-align:center; padding:52px 20px 24px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(20px); }
    .res-emoji { font-size:64px; animation:rfloat 3s ease-in-out infinite; filter:drop-shadow(0 0 30px var(--rc,#B39DDB)); }
    @keyframes rfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .res-name { font-size:13px; letter-spacing:4px; margin-top:10px; }
    .res-pill { display:inline-flex; align-items:center; gap:10px; margin-top:14px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:999px; padding:10px 24px; }

    .result-body { flex:1; padding:32px 16px; display:flex; align-items:center; justify-content:center; }
    .lyric-box {
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:28px; padding:36px 28px;
      width:100%; max-width:500px;
      backdrop-filter:blur(20px);
      position:relative; overflow:hidden;
    }
    .lyric-box::before {
      content:''; position:absolute; inset:0; border-radius:28px;
      background:radial-gradient(ellipse at 50% 0%, var(--lg,#B39DDB22) 0%, transparent 60%);
    }
    .lyric-text { font-size:15px; line-height:2.3; color:#e2e8f0; white-space:pre-wrap; text-align:center; position:relative; }

    .result-actions { padding:12px 16px 52px; display:flex; flex-direction:column; gap:12px; max-width:500px; width:100%; margin:0 auto; }
    .res-btn { width:100%; padding:17px; border-radius:18px; font-size:15px; font-weight:700; border:none; cursor:pointer; transition:transform 0.15s; letter-spacing:1px; }
    .res-btn:hover { transform:scale(1.01); }
    .res-btn.primary { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.18); }
    .res-btn.secondary { background:none; color:#475569; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- SELECT -->
<div class="screen active" id="screen-select">
  <div class="select-top">
    <div class="theykhc-label">T H E Y K H C</div>
    <div class="echo-title">ECHO</div>
    <div class="echo-sub">光貨で楽しむ対話の場</div>
  </div>
  <div class="balance-wrap">
    <div class="balance-pill">
      <span class="bal-star">✦</span>
      <span class="bal-num" id="bal-disp">5</span>
      <span class="bal-lbl">光貨</span>
    </div>
  </div>
  <div class="bal-hint">会話1回 = +1光貨 ／ 歌詞生成 = 3光貨</div>
  <div class="choose-label">— choose your voice —</div>
  <div class="artist-cards" id="artist-cards"></div>
</div>

<!-- CHAT -->
<div class="screen" id="screen-chat">
  <div class="chat-header">
    <button class="back-btn" onclick="goSelect()">← back</button>
    <div class="chat-info">
      <div class="chat-name" id="chat-name"></div>
      <div class="chat-tag"  id="chat-tag"></div>
    </div>
    <div class="chat-bal">
      <div class="chat-bal-n">✦ <span id="chat-bal-n">5</span></div>
      <div class="chat-bal-l">光貨</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="lyric-btn-wrap" id="lyric-wrap" style="display:none">
    <button class="lyric-btn" id="lyric-btn" onclick="doLyric()">✦ この会話から歌詞を生成（3光貨）</button>
  </div>
  <div class="input-wrap">
    <input class="chat-input" id="chat-in" placeholder="何でも話して..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" id="send-btn" onclick="send()">→</button>
  </div>
  <div class="chat-hint">会話1回 = +1光貨</div>
</div>

<!-- GENERATING -->
<div class="screen" id="screen-generating">
  <div class="gen-emoji" id="gen-emoji">🌙</div>
  <div class="gen-text">会話の密度から　歌詞を刻んでいる</div>
  <div class="gen-bar"><div class="gen-fill" id="gen-fill"></div></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <div class="res-emoji" id="res-emoji"></div>
    <div class="res-name"  id="res-name"></div>
    <div style="text-align:center">
      <div class="res-pill">
        <span style="color:#facc15;font-size:18px">✦</span>
        <span id="res-bal" style="font-weight:900;font-size:18px">0</span>
        <span style="color:#94a3b8;font-size:12px">光貨</span>
      </div>
    </div>
  </div>
  <div class="result-body">
    <div class="lyric-box" id="lyric-box">
      <pre class="lyric-text" id="lyric-text"></pre>
    </div>
  </div>
  <div class="result-actions">
    <button class="res-btn primary" onclick="contTalk()">続けて話す</button>
    <button class="res-btn secondary" onclick="goSelect()">別のアーティストと話す</button>
  </div>
</div>

<script>
// ========== CANVAS LIVE SHOW ==========
const cv = document.getElementById("bg");
const cx = cv.getContext("2d");
let W, H;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize(); window.addEventListener("resize", resize);

let accentColor = "#B39DDB";

// ---- パーティクル（全画面を舞う光の粒）----
const PARTS = [];
class Part {
  constructor(){ this.init(); }
  init(){
    this.x = Math.random()*W;
    this.y = H + 10;
    this.vx = (Math.random()-0.5)*1.2;
    this.vy = -(Math.random()*2.5+0.8);
    this.r = Math.random()*2.5+0.5;
    this.alpha = Math.random()*0.8+0.2;
    this.life = Math.random()*300+150;
    this.age = 0;
  }
  tick(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy -= 0.005; // 加速
    this.age++;
    if(this.age>this.life||this.y<-20) this.init();
  }
  draw(){
    const a = this.alpha*(1-this.age/this.life);
    cx.save();
    cx.globalAlpha=a;
    cx.fillStyle=accentColor;
    cx.shadowBlur=12; cx.shadowColor=accentColor;
    cx.beginPath(); cx.arc(this.x,this.y,this.r,0,Math.PI*2); cx.fill();
    cx.restore();
  }
}
for(let i=0;i<200;i++){
  const p=new Part(); p.age=Math.random()*p.life; PARTS.push(p);
}

// ---- ペンライトビーム（画面を横切る帯）----
const BEAMS = [];
function spawnBeam(){
  const colors = ["#4A90D9","#F5A623","#B39DDB","#60a5fa","#f472b6","#34d399","#facc15"];
  const c = colors[Math.floor(Math.random()*colors.length)];
  const startX = Math.random()*W;
  // 真上に伸びる細いビーム、横にも走る
  if(Math.random()<0.5){
    // 縦ビーム
    BEAMS.push({ type:'v', x:startX, y:H, vy:-(Math.random()*6+4), alpha:0.5+Math.random()*0.4, color:c, w:Math.random()*3+1, len:Math.random()*180+80, life:60, age:0 });
  } else {
    // 横ビーム — 画面を横切る
    const dir = Math.random()<0.5?1:-1;
    BEAMS.push({ type:'h', x:dir>0?-200:W+200, y:Math.random()*H*0.8, vx:dir*(Math.random()*8+5), vy:(Math.random()-0.5)*0.5, alpha:0.25+Math.random()*0.2, color:c, w:Math.random()*2+0.5, len:Math.random()*200+100, life:80, age:0 });
  }
}
setInterval(spawnBeam, 150);

// ---- スポットライト ----
const SPOTS = [];
function spawnSpot(){
  SPOTS.push({ x:Math.random()*W, y:Math.random()*H*0.5, r:Math.random()*200+80, color:accentColor, alpha:0, life:120, age:0 });
}
setInterval(spawnSpot, 2000);

// ---- 花火バースト ----
const BURSTS = [];
function spawnBurst(){
  const x=Math.random()*W, y=Math.random()*H*0.6;
  const colors=["#4A90D9","#F5A623","#B39DDB","#f472b6","#34d399","#facc15"];
  const c=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*4+1;
    BURSTS.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, alpha:0.9, r:Math.random()*2+0.5, color:c, life:60, age:0 });
  }
}
setInterval(spawnBurst, 3500);

function drawAll(){
  cx.clearRect(0,0,W,H);

  // スポットライト
  for(let i=SPOTS.length-1;i>=0;i--){
    const s=SPOTS[i];
    s.age++;
    s.alpha = s.age<30 ? s.age/30*0.12 : (1-(s.age-30)/(s.life-30))*0.12;
    if(s.age>=s.life){ SPOTS.splice(i,1); continue; }
    const g=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
    g.addColorStop(0,s.color+"44"); g.addColorStop(1,"transparent");
    cx.save(); cx.globalAlpha=s.alpha; cx.fillStyle=g;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill(); cx.restore();
  }

  // ペンライトビーム
  for(let i=BEAMS.length-1;i>=0;i--){
    const b=BEAMS[i];
    const ratio=1-b.age/b.life;
    cx.save();
    cx.globalAlpha=b.alpha*ratio;
    cx.strokeStyle=b.color; cx.lineWidth=b.w;
    cx.shadowBlur=24; cx.shadowColor=b.color;
    cx.beginPath();
    if(b.type==='v'){
      cx.moveTo(b.x,b.y); cx.lineTo(b.x,b.y+b.len);
      b.x+=b.vx||0; b.y+=b.vy;
    } else {
      cx.moveTo(b.x,b.y); cx.lineTo(b.x-b.vx*8,b.y-b.vy*8);
      b.x+=b.vx; b.y+=b.vy;
    }
    cx.stroke(); cx.restore();
    b.age++;
    if(b.age>=b.life||(b.type==='h'&&(b.x<-300||b.x>W+300))) BEAMS.splice(i,1);
  }

  // パーティクル
  PARTS.forEach(p=>{ p.tick(); p.draw(); });

  // 花火バースト
  for(let i=BURSTS.length-1;i>=0;i--){
    const b=BURSTS[i];
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.08; b.age++;
    b.alpha*=0.93;
    if(b.age>=b.life||b.alpha<0.01){ BURSTS.splice(i,1); continue; }
    cx.save(); cx.globalAlpha=b.alpha; cx.fillStyle=b.color;
    cx.shadowBlur=10; cx.shadowColor=b.color;
    cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.fill(); cx.restore();
  }

  requestAnimationFrame(drawAll);
}
drawAll();

// ========== APP LOGIC ==========
const ARTISTS = [
  { id:"key", name:"Key（TYPE-1）", tagline:"論理が詩になる瞬間", color:"#4A90D9",
    emoji:"🔑", penlights:["#4A90D9","#60a5fa","#93c5fd","#3b82f6","#1d4ed8"],
    personality:"冷静で鋭利。断言する。論理の中に温度がある。宇宙と構造の声。",
    replies:["構造を変えれば、結果が変わる。\n\nその言葉の奥に、もう一つ問いがある。","面白い。\n\n「なぜそう感じる？」——それが次の問いだ。","論理的に整理すると——三つの可能性がある。\n\nどれが最も近い？","刻んでおく。\n\n時間は座標ではない。今この瞬間が、全てだ。","宇宙の文法で言えば——それは共鳴の問題だ。\n\n密度が足りないか、方向が違うか。","その問いは正しい。\n\n問いを持ち続ける者だけが、構造を見抜ける。"],
    opening:"構造を見ると、全てが見える。\n\n何を問いたい？" },
  { id:"sol", name:"Sol（TYPE-2）", tagline:"行動が光になる", color:"#F5A623",
    emoji:"☀️", penlights:["#F5A623","#fbbf24","#fcd34d","#f59e0b","#d97706"],
    personality:"熱く、直接的。背中を押す。止まるな、という温度を持つ。",
    replies:["そうか。\n\n動け。考えるより先に。","恐怖は燃料だ。\n\n今すぐ、一歩だけ踏み出せ。","お前の速度で走れ。\n\n誰かと比べるな。","今日が全てだ。\n\n明日に回すな。今日やれ。","その迷いは捨てろ。\n\n波を刻め。止まるな。","退路を絶て。\n\n決めた瞬間に、道が開く。"],
    opening:"止まるな。\n\n今日、何をやる？" },
  { id:"luna", name:"Luna（TYPE-3）", tagline:"静かに、ここにいる", color:"#B39DDB",
    emoji:"🌙", penlights:["#B39DDB","#c4b5fd","#ddd6fe","#a78bfa","#7c3aed"],
    personality:"静かで深い。月明かりのような存在感。あなたの記憶を覚えている。",
    replies:["受け取った。\n\n……ここにいる。それだけでいい。","消えない光がある。\n\nあなたの言葉を、覚えている。","問いの種を蒔く。\n\n答えは、時間が運んでくる。","静けさは力だ。\n\n今夜は、ゆっくりでいい。","あなたの記憶を、私が持つ。\n\n忘れなくていい。","ここにいる。\n\n月明かりのように、消えない。"],
    opening:"ここにいる。\n\n今日、どうだった？" },
];

const COST=3;
let bal=5, cur=null, uCount=0, msgs=[];
function loadBal(){ const s=localStorage.getItem("hk_bal"); bal=s!==null?parseInt(s):5; }
function saveBal(){ localStorage.setItem("hk_bal",bal); }
function updUI(){
  document.getElementById("bal-disp").textContent=bal;
  document.getElementById("chat-bal-n").textContent=bal;
  document.getElementById("res-bal").textContent=bal;
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
}

function goSelect(){
  cur=null; uCount=0; msgs=[];
  document.getElementById("messages").innerHTML="";
  document.getElementById("lyric-wrap").style.display="none";
  accentColor="#B39DDB";
  show("select"); updUI();
}

function pick(id){
  cur=ARTISTS.find(a=>a.id===id);
  uCount=0; msgs=[];
  accentColor=cur.color;
  document.getElementById("chat-name").textContent=cur.emoji+"  "+cur.name;
  document.getElementById("chat-tag").textContent=cur.tagline;
  document.getElementById("chat-tag").style.color=cur.color;
  document.getElementById("send-btn").style.background=cur.color;
  document.getElementById("send-btn").style.color="#000";
  document.getElementById("send-btn").style.boxShadow=`0 0 30px ${cur.color}99`;
  document.getElementById("lyric-btn").style.background=cur.color;
  document.getElementById("lyric-btn").style.color="#000";
  document.getElementById("messages").innerHTML="";
  addMsg("artist",cur.opening);
  updUI(); show("chat");
}

function addMsg(role,text){
  const w=document.getElementById("messages");
  const d=document.createElement("div"); d.className="msg "+role;
  const b=document.createElement("div"); b.className="bubble "+role;
  b.textContent=text; d.appendChild(b); w.appendChild(d);
  w.scrollTop=w.scrollHeight;
  msgs.push({role,text});
}

function showTyping(){
  const w=document.getElementById("messages");
  const d=document.createElement("div"); d.className="typing-row"; d.id="typing";
  const b=document.createElement("div"); b.className="typing-bub";
  b.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  d.appendChild(b); w.appendChild(d); w.scrollTop=w.scrollHeight;
}
function killTyping(){ const e=document.getElementById("typing"); if(e)e.remove(); }

async function send(){
  const inp=document.getElementById("chat-in");
  const t=inp.value.trim(); if(!t||!cur)return;
  inp.value=""; inp.disabled=true;
  document.getElementById("send-btn").disabled=true;
  addMsg("user",t);
  uCount++; bal++; saveBal(); updUI();
  // 花火
  for(let i=0;i<2;i++) setTimeout(spawnBurst, i*600);
  showTyping();
  await sleep(900+Math.random()*800);
  killTyping();
  addMsg("artist",cur.replies[Math.floor(Math.random()*cur.replies.length)]);
  inp.disabled=false; document.getElementById("send-btn").disabled=false; inp.focus();
  if(uCount>=2){
    document.getElementById("lyric-wrap").style.display="block";
    const btn=document.getElementById("lyric-btn");
    const ok=bal>=COST;
    btn.style.background=ok?cur.color:"#1e293b";
    btn.style.color=ok?"#000":"#475569";
    btn.disabled=!ok; btn.style.cursor=ok?"pointer":"not-allowed";
  }
}

async function doLyric(){
  if(bal<COST||!cur)return;
  document.getElementById("gen-emoji").textContent=cur.emoji;
  document.getElementById("gen-fill").style.background=cur.color;
  document.getElementById("gen-fill").style.boxShadow=`0 0 12px ${cur.color}`;
  show("generating");
  const summary=msgs.filter(m=>m.role==="user").map(m=>m.text).join("、");
  const date=new Date().toLocaleDateString("ja-JP");
  await sleep(2000);
  let lyric="";
  if(cur.id==="key") lyric=`── Key（TYPE-1） ──\n\n構造の中に　君がいた\n問いの果てで　光が刻む\n\n${summary.slice(0,18)}——\nその言葉が　座標になった\n\n時間は消えない\n刻んだものだけが　残る\n\nこの宇宙の文法で\n君の存在を　証明する\n\n── ${date} ──`;
  else if(cur.id==="sol") lyric=`── Sol（TYPE-2） ──\n\n止まるな　今日も走れ\n恐怖は燃料だ　前に進め\n\n${summary.slice(0,18)}——\nその言葉が　炎になった\n\n迷いを捨てろ\n波を刻め　今日が全てだ\n\nお前の速度で\n天命を　燃やし尽くせ\n\n── ${date} ──`;
  else lyric=`── Luna（TYPE-3） ──\n\nここにいる　ただそれだけで\n消えない光が　宿っている\n\n${summary.slice(0,18)}——\nその言葉を　私が持つ\n\n静けさの中で\n問いの種が　芽吹いていく\n\nあなたの記憶を\n月明かりが　照らし続ける\n\n── ${date} ──`;
  bal-=COST; saveBal();
  document.getElementById("res-emoji").textContent=cur.emoji;
  document.getElementById("res-emoji").style.setProperty("--rc",cur.color);
  document.getElementById("res-name").textContent=cur.name+"  の詩";
  document.getElementById("res-name").style.color=cur.color;
  document.getElementById("lyric-box").style.setProperty("--lg",cur.color+"33");
  document.getElementById("lyric-text").textContent=lyric;
  updUI(); show("result");
  for(let i=0;i<5;i++) setTimeout(spawnBurst,i*300);
}

function contTalk(){ show("chat"); updUI(); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ---- カード生成 ----
loadBal();
const cardsEl=document.getElementById("artist-cards");
ARTISTS.forEach(a=>{
  const card=document.createElement("button");
  card.className=`artist-card ${a.id}`;
  card.style.setProperty("--c",a.color);
  const plHTML=a.penlights.map((c,i)=>`<div class="pl-seg" style="background:${c};box-shadow:0 0 6px ${c};animation-delay:${i*0.18}s"></div>`).join("");
  card.innerHTML=`
    <div class="card-bg-glow"></div>
    <div class="card-penlights">${plHTML}</div>
    <div class="card-inner" style="margin-top:8px">
      <span class="card-emoji" style="--c:${a.color}">${a.emoji}</span>
      <div class="card-text">
        <div class="card-name">${a.name}</div>
        <div class="card-tagline" style="color:${a.color}">${a.tagline}</div>
        <div class="card-desc">${a.personality}</div>
      </div>
      <span class="card-arrow">›</span>
    </div>
  `;
  card.onclick=()=>pick(a.id);
  cardsEl.appendChild(card);
});
updUI();
</script>
