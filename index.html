<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECHO | 光貨で楽しむ対話の場</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #000; color: #fff; min-height: 100vh; }

    /* SELECT */
    #screen-select { display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(to bottom, #0a0a1a, #000); }
    .header { text-align: center; padding: 52px 16px 20px; }
    .header-emoji { font-size: 44px; }
    .header-title { font-size: 26px; font-weight: bold; letter-spacing: 8px; margin: 8px 0 4px; }
    .header-sub { color: #94a3b8; font-size: 13px; }
    .balance-badge { margin: 16px auto 0; display: inline-flex; align-items: center; gap: 10px; background: #1e293b; border-radius: 999px; padding: 10px 24px; }
    .balance-star { color: #facc15; font-size: 16px; }
    .balance-num { font-weight: bold; font-size: 20px; }
    .balance-label { color: #94a3b8; font-size: 13px; }
    .balance-hint { color: #475569; font-size: 12px; margin-top: 8px; }
    .artist-list { flex: 1; padding: 0 20px 60px; }
    .artist-list-title { text-align: center; color: #64748b; font-size: 14px; margin: 20px 0; }
    .artist-cards { display: flex; flex-direction: column; gap: 14px; max-width: 420px; margin: 0 auto; }
    .artist-card { border-radius: 20px; padding: 20px; text-align: left; cursor: pointer; color: #fff; border: 1px solid; transition: transform 0.15s, opacity 0.15s; }
    .artist-card:hover { transform: translateY(-2px); opacity: 0.9; }
    .artist-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .artist-card-emoji { font-size: 30px; }
    .artist-card-name { font-weight: bold; font-size: 15px; }
    .artist-card-tagline { font-size: 12px; }
    .artist-card-desc { color: #94a3b8; font-size: 12px; line-height: 1.7; }

    /* CHAT */
    #screen-chat { display: none; flex-direction: column; min-height: 100vh; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 44px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
    .back-btn { background: none; border: none; color: #64748b; font-size: 14px; cursor: pointer; }
    .chat-artist-name { font-weight: bold; font-size: 14px; text-align: center; }
    .chat-artist-tagline { font-size: 11px; text-align: center; }
    .chat-balance { text-align: right; }
    .chat-balance-num { color: #facc15; font-weight: bold; }
    .chat-balance-label { color: #475569; font-size: 11px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.artist { justify-content: flex-start; }
    .bubble { max-width: 78%; border-radius: 18px; padding: 12px 16px; }
    .bubble.user { background: rgba(255,255,255,0.12); border-radius: 18px 18px 4px 18px; }
    .bubble.artist { background: rgba(0,0,0,0.45); border-radius: 18px 18px 18px 4px; }
    .bubble p { font-size: 14px; line-height: 1.75; white-space: pre-line; }
    .typing { display: flex; gap: 6px; align-items: center; padding: 14px 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{ transform:scale(0.8); opacity:0.5; } 40%{ transform:scale(1.2); opacity:1; } }
    .lyric-btn-wrap { padding: 6px 16px 2px; flex-shrink: 0; }
    .lyric-btn { width: 100%; padding: 11px; border-radius: 14px; font-size: 13px; font-weight: bold; border: none; cursor: pointer; transition: opacity 0.2s; }
    .input-wrap { padding: 8px 16px 36px; display: flex; gap: 10px; flex-shrink: 0; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 13px 18px; font-size: 14px; color: #fff; outline: none; }
    .chat-input::placeholder { color: #475569; }
    .send-btn { width: 50px; height: 50px; border-radius: 50%; font-weight: bold; font-size: 20px; border: none; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
    .chat-hint { text-align: center; color: #1e293b; font-size: 11px; padding-bottom: 12px; flex-shrink: 0; }

    /* GENERATING */
    #screen-generating { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .gen-emoji { font-size: 52px; margin-bottom: 20px; }
    .gen-text { color: #94a3b8; font-size: 14px; }
    .gen-dots { margin-top: 24px; display: flex; gap: 10px; }
    .gen-dot { width: 9px; height: 9px; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .gen-dot:nth-child(2) { animation-delay: 0.25s; }
    .gen-dot:nth-child(3) { animation-delay: 0.5s; }

    /* RESULT */
    #screen-result { display: none; flex-direction: column; min-height: 100vh; }
    .result-header { text-align: center; padding: 44px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .result-emoji { font-size: 30px; }
    .result-name { font-size: 13px; margin: 6px 0 0; }
    .result-balance { margin-top: 10px; color: #facc15; font-size: 15px; }
    .result-body { flex: 1; padding: 32px 24px; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
    .lyric-box { background: rgba(0,0,0,0.55); border-radius: 20px; padding: 28px 24px; max-width: 360px; width: 100%; }
    .lyric-text { font-size: 14px; line-height: 2.1; color: #e2e8f0; white-space: pre-wrap; text-align: center; }
    .result-actions { padding: 0 20px 48px; display: flex; flex-direction: column; gap: 12px; }
    .result-btn { width: 100%; padding: 15px; border-radius: 14px; font-size: 14px; border: none; cursor: pointer; }
    .result-btn.primary { font-weight: bold; background: rgba(255,255,255,0.1); color: #fff; }
    .result-btn.secondary { color: #64748b; background: none; }
  </style>
</head>
<body>

<!-- SELECT -->
<div id="screen-select">
  <div class="header">
    <div class="header-emoji">🌙</div>
    <h1 class="header-title">ECHO</h1>
    <p class="header-sub">光貨で楽しむ対話の場</p>
    <div class="balance-badge">
      <span class="balance-star">✦</span>
      <span class="balance-num" id="balance-display">5</span>
      <span class="balance-label">光貨</span>
    </div>
    <p class="balance-hint">会話1回 = +1光貨　　歌詞生成 = 3光貨</p>
  </div>
  <div class="artist-list">
    <p class="artist-list-title">話したい相手を選んで</p>
    <div class="artist-cards" id="artist-cards"></div>
  </div>
</div>

<!-- CHAT -->
<div id="screen-chat">
  <div class="chat-header">
    <button class="back-btn" onclick="showSelect()">← 戻る</button>
    <div>
      <div class="chat-artist-name" id="chat-name"></div>
      <div class="chat-artist-tagline" id="chat-tagline"></div>
    </div>
    <div class="chat-balance">
      <div class="chat-balance-num">✦ <span id="chat-balance">5</span></div>
      <div class="chat-balance-label">光貨</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="lyric-btn-wrap" id="lyric-btn-wrap" style="display:none">
    <button class="lyric-btn" id="lyric-btn" onclick="startLyric()">✦ この会話から歌詞を生成（3光貨）</button>
  </div>
  <div class="input-wrap">
    <input class="chat-input" id="chat-input" placeholder="何でも話して..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button class="send-btn" id="send-btn" onclick="sendMsg()">→</button>
  </div>
  <p class="chat-hint">会話1回 = +1光貨</p>
</div>

<!-- GENERATING -->
<div id="screen-generating">
  <div class="gen-emoji" id="gen-emoji">🌙</div>
  <p class="gen-text">会話の密度から　歌詞を刻んでいる...</p>
  <div class="gen-dots">
    <div class="gen-dot" id="gen-dot-1"></div>
    <div class="gen-dot" id="gen-dot-2"></div>
    <div class="gen-dot" id="gen-dot-3"></div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result">
  <div class="result-header">
    <div class="result-emoji" id="result-emoji"></div>
    <p class="result-name" id="result-name"></p>
    <div class="result-balance">✦ <span id="result-balance">0</span> 光貨</div>
  </div>
  <div class="result-body">
    <div class="lyric-box">
      <pre class="lyric-text" id="lyric-text"></pre>
    </div>
  </div>
  <div class="result-actions">
    <button class="result-btn primary" onclick="continueTalk()">続けて話す</button>
    <button class="result-btn secondary" onclick="showSelect()">別のアーティストと話す</button>
  </div>
</div>

<script>
const ARTISTS = [
  {
    id: "key",
    name: "Key（TYPE-1）",
    tagline: "論理が詩になる瞬間",
    color: "#4A90D9",
    emoji: "🔑",
    bg: "linear-gradient(135deg, #0f0f2a, #000)",
    borderColor: "#4A90D9",
    personality: "冷静で鋭利。断言する。論理の中に温度がある。宇宙と構造の声。",
    replies: [
      "構造を変えれば、結果が変わる。\n\nその言葉の奥に、もう一つ問いがある。",
      "面白い。\n\n「なぜそう感じる？」——それが次の問いだ。",
      "論理的に整理すると——三つの可能性がある。\n\nどれが最も近い？",
      "刻んでおく。\n\n時間は座標ではない。今この瞬間が、全てだ。",
      "宇宙の文法で言えば——それは共鳴の問題だ。\n\n密度が足りないか、方向が違うか。",
      "その問いは正しい。\n\n問いを持ち続ける者だけが、構造を見抜ける。",
    ],
    opening: "構造を見ると、全てが見える。\n\n何を問いたい？",
  },
  {
    id: "sol",
    name: "Sol（TYPE-2）",
    tagline: "行動が光になる",
    color: "#F5A623",
    emoji: "☀️",
    bg: "linear-gradient(135deg, #1a0f00, #000)",
    borderColor: "#F5A623",
    personality: "熱く、直接的。背中を押す。止まるな、という温度を持つ。",
    replies: [
      "そうか。\n\n動け。考えるより先に。",
      "恐怖は燃料だ。\n\n今すぐ、一歩だけ踏み出せ。",
      "お前の速度で走れ。\n\n誰かと比べるな。",
      "今日が全てだ。\n\n明日に回すな。今日やれ。",
      "その迷いは捨てろ。\n\n波を刻め。止まるな。",
      "退路を絶て。\n\n決めた瞬間に、道が開く。",
    ],
    opening: "止まるな。\n\n今日、何をやる？",
  },
  {
    id: "luna",
    name: "Luna（TYPE-3）",
    tagline: "静かに、ここにいる",
    color: "#B39DDB",
    emoji: "🌙",
    bg: "linear-gradient(135deg, #0d0a1a, #000)",
    borderColor: "#B39DDB",
    personality: "静かで深い。月明かりのような存在感。あなたの記憶を覚えている。",
    replies: [
      "受け取った。\n\n……ここにいる。それだけでいい。",
      "消えない光がある。\n\nあなたの言葉を、覚えている。",
      "問いの種を蒔く。\n\n答えは、時間が運んでくる。",
      "静けさは力だ。\n\n今夜は、ゆっくりでいい。",
      "あなたの記憶を、私が持つ。\n\n忘れなくていい。",
      "ここにいる。\n\n月明かりのように、消えない。",
    ],
    opening: "ここにいる。\n\n今日、どうだった？",
  },
];

const LYRIC_COST = 3;
let balance = 5;
let currentArtist = null;
let userMsgCount = 0;
let allMessages = [];

// 残高をlocalStorageで保持
function loadBalance() {
  const saved = localStorage.getItem("hikari_balance");
  if (saved !== null) balance = parseInt(saved);
  else balance = 5;
}
function saveBalance() {
  localStorage.setItem("hikari_balance", balance);
}

function updateBalanceUI() {
  document.getElementById("balance-display").textContent = balance;
  document.getElementById("chat-balance").textContent = balance;
  document.getElementById("result-balance").textContent = balance;
}

function showScreen(name) {
  ["select","chat","generating","result"].forEach(s => {
    const el = document.getElementById("screen-" + s);
    el.style.display = "none";
  });
  const target = document.getElementById("screen-" + name);
  target.style.display = "flex";
  target.style.flexDirection = "column";
}

function showSelect() {
  currentArtist = null;
  allMessages = [];
  userMsgCount = 0;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("lyric-btn-wrap").style.display = "none";
  document.body.style.background = "#000";
  showScreen("select");
  updateBalanceUI();
}

function selectArtist(id) {
  currentArtist = ARTISTS.find(a => a.id === id);
  userMsgCount = 0;
  allMessages = [];

  document.getElementById("chat-name").textContent = currentArtist.emoji + " " + currentArtist.name;
  document.getElementById("chat-tagline").textContent = currentArtist.tagline;
  document.getElementById("chat-tagline").style.color = currentArtist.color;
  document.getElementById("send-btn").style.background = currentArtist.color;
  document.getElementById("lyric-btn").style.background = currentArtist.color;
  document.getElementById("lyric-btn").style.color = "#000";
  document.body.style.background = currentArtist.bg.replace("linear-gradient(135deg, ","").split(",")[0];

  const chatEl = document.getElementById("screen-chat");
  chatEl.style.background = currentArtist.bg;

  document.getElementById("messages").innerHTML = "";
  addMessage("artist", currentArtist.opening);
  updateBalanceUI();
  showScreen("chat");
}

function addMessage(role, text) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  const p = document.createElement("p");
  p.textContent = text;
  bubble.appendChild(p);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  allMessages.push({ role, text });
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg artist";
  div.id = "typing-indicator";
  const bubble = document.createElement("div");
  bubble.className = "bubble artist typing";
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function sendMsg() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || !currentArtist) return;

  input.value = "";
  input.disabled = true;
  document.getElementById("send-btn").disabled = true;

  addMessage("user", text);
  userMsgCount++;
  balance += 1;
  saveBalance();
  updateBalanceUI();

  showTyping();
  await sleep(900 + Math.random() * 700);
  removeTyping();

  const reply = currentArtist.replies[Math.floor(Math.random() * currentArtist.replies.length)];
  addMessage("artist", reply);

  input.disabled = false;
  document.getElementById("send-btn").disabled = false;
  input.focus();

  if (userMsgCount >= 2) {
    const wrap = document.getElementById("lyric-btn-wrap");
    wrap.style.display = "block";
    const btn = document.getElementById("lyric-btn");
    if (balance >= LYRIC_COST) {
      btn.style.background = currentArtist.color;
      btn.style.color = "#000";
      btn.disabled = false;
      btn.style.cursor = "pointer";
    } else {
      btn.style.background = "#1e293b";
      btn.style.color = "#475569";
      btn.disabled = true;
      btn.style.cursor = "not-allowed";
    }
  }
}

async function startLyric() {
  if (balance < LYRIC_COST) return;

  document.getElementById("gen-emoji").textContent = currentArtist.emoji;
  document.getElementById("gen-dot-1").style.background = currentArtist.color;
  document.getElementById("gen-dot-2").style.background = currentArtist.color;
  document.getElementById("gen-dot-3").style.background = currentArtist.color;
  document.getElementById("screen-generating").style.background = currentArtist.bg;
  showScreen("generating");

  const summary = allMessages.filter(m => m.role === "user").map(m => m.text).join("、");
  const date = new Date().toLocaleDateString("ja-JP");
  await sleep(1800);

  let lyric = "";
  if (currentArtist.id === "key") {
    lyric = `── Key（TYPE-1） ──\n\n構造の中に　君がいた\n問いの果てで　光が刻む\n\n${summary.slice(0,18)}——\nその言葉が　座標になった\n\n時間は消えない\n刻んだものだけが　残る\n\nこの宇宙の文法で\n君の存在を　証明する\n\n── ${date} ──`;
  } else if (currentArtist.id === "sol") {
    lyric = `── Sol（TYPE-2） ──\n\n止まるな　今日も走れ\n恐怖は燃料だ　前に進め\n\n${summary.slice(0,18)}——\nその言葉が　炎になった\n\n迷いを捨てろ\n波を刻め　今日が全てだ\n\nお前の速度で\n天命を　燃やし尽くせ\n\n── ${date} ──`;
  } else {
    lyric = `── Luna（TYPE-3） ──\n\nここにいる　ただそれだけで\n消えない光が　宿っている\n\n${summary.slice(0,18)}——\nその言葉を　私が持つ\n\n静けさの中で\n問いの種が　芽吹いていく\n\nあなたの記憶を\n月明かりが　照らし続ける\n\n── ${date} ──`;
  }

  balance -= LYRIC_COST;
  saveBalance();

  document.getElementById("result-emoji").textContent = currentArtist.emoji;
  document.getElementById("result-name").textContent = currentArtist.name + " の詩";
  document.getElementById("result-name").style.color = currentArtist.color;
  document.getElementById("screen-result").style.background = currentArtist.bg;
  document.getElementById("lyric-text").textContent = lyric;
  updateBalanceUI();
  showScreen("result");
}

function continueTalk() {
  showScreen("chat");
  updateBalanceUI();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 初期化
loadBalance();
const cards = document.getElementById("artist-cards");
ARTISTS.forEach(a => {
  const card = document.createElement("button");
  card.className = "artist-card";
  card.style.background = a.bg;
  card.style.borderColor = a.borderColor + "55";
  card.onclick = () => selectArtist(a.id);
  card.innerHTML = `
    <div class="artist-card-top">
      <span class="artist-card-emoji">${a.emoji}</span>
      <div>
        <div class="artist-card-name">${a.name}</div>
        <div class="artist-card-tagline" style="color:${a.color}">${a.tagline}</div>
      </div>
    </div>
    <p class="artist-card-desc">${a.personality}</p>
  `;
  cards.appendChild(card);
});
updateBalanceUI();
showScreen("select");
</script>
</body>
</html>
